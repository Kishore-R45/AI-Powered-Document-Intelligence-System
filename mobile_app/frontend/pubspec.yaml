name: docvault_mobile
description: DocVault - AI-Powered Document Intelligence System Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.2.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.0.0

  # Navigation
  go_router: ^13.0.0

  # UI & Design
  google_fonts: ^6.0.0
  flutter_animate: ^4.0.0
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  gap: ^3.0.0
  percent_indicator: ^4.2.0
  fl_chart: ^0.66.0
  cached_network_image: ^3.3.0

  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.2.0
  uuid: ^4.0.0

  # Auth & Security (biometric login)
  local_auth: ^2.1.0

  # Camera & Files
  image_picker: ^1.0.0
  path_provider: ^2.1.0

  # Local Storage (offline support)
  hive: ^2.2.0
  hive_flutter: ^1.1.0

  # Network
  http: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
